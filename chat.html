<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能客服 - 聊天页面</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font:14px/1.6 -apple-system, "Microsoft YaHei", sans-serif; background:#f0f2f5; height:100vh; display:flex; justify-content:center; align-items:center; }
  .chat-container { width:420px; max-height:90vh; background:#fff; border-radius:12px; box-shadow:0 2px 16px rgba(0,0,0,.1); display:flex; flex-direction:column; overflow:hidden; }
  .header { background:#1677ff; color:#fff; padding:14px 18px; font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .header .dot { width:8px; height:8px; background:#52c41a; border-radius:50%; }
  .messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; max-height:500px; }
  .msg { max-width:85%; padding:10px 14px; border-radius:8px; line-height:1.5; word-break:break-word; white-space:pre-wrap; }
  .msg.user { align-self:flex-end; background:#1677ff; color:#fff; }
  .msg.bot  { align-self:flex-start; background:#f0f2f5; color:#333; }
  .msg .meta { font-size:11px; margin-top:4px; opacity:.65; }
  .input-area { display:flex; gap:8px; padding:12px 16px; border-top:1px solid #eee; }
  .input-area input { flex:1; padding:10px 12px; border:1px solid #d9d9d9; border-radius:6px; font-size:14px; outline:none; }
  .input-area input:focus { border-color:#1677ff; }
  .input-area button { padding:10px 18px; background:#1677ff; color:#fff; border:none; border-radius:6px; font-size:14px; cursor:pointer; }
  .input-area button:disabled { opacity:.5; cursor:not-allowed; }
  .session-info { font-size:11px; color:#999; text-align:center; padding:6px; }
  .loading::after { content:''; display:inline-block; width:10px; height:10px; margin-left:6px; border:2px solid #1677ff; border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header"><span class="dot"></span>智能客服</div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input id="input" type="text" placeholder="输入您的问题..." autofocus />
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
  <div class="session-info" id="sessionInfo"></div>
</div>

<script>
const API = 'http://localhost:8000';          // ← 改成你的 API 地址
let sessionId = null;

// 页面加载：自动创建会话
(async function init() {
  try {
    const res = await fetch(API + '/session/new', { method:'POST' });
    const data = await res.json();
    sessionId = data.session_id;
    document.getElementById('sessionInfo').textContent = 'Session: ' + sessionId;
  } catch(e) {
    document.getElementById('sessionInfo').textContent = '⚠ 无法连接 API，请确认服务已启动';
  }
})();

function addMessage(role, text, meta) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = text + (meta ? '<div class="meta">' + meta + '</div>' : '');
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior:'smooth' });
  return div;
}

async function send() {
  const input = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text || !sessionId) return;

  input.value = '';
  input.disabled = btn.disabled = true;

  addMessage('user', text);
  const botDiv = addMessage('bot', '思考中...');
  botDiv.classList.add('loading');

  try {
    const res = await fetch(API + '/chat', {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ session_id:sessionId, message:text })
    });
    const data = await res.json();
    botDiv.classList.remove('loading');
    botDiv.innerHTML = data.answer
      + '<div class="meta">意图: ' + data.intent
      + (data.needs_human ? ' · ⚠ 建议转人工' : '') + '</div>';
  } catch(e) {
    botDiv.classList.remove('loading');
    botDiv.innerHTML = '网络错误，请检查 API 是否启动';
  }

  input.disabled = btn.disabled = false;
  input.focus();
}

// 回车发送
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});
</script>

</body>
</html>
